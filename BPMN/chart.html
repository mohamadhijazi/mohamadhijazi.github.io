<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process Mining Advanced Analytics Dashboard</title>
  
  <!-- Highcharts Core and Advanced Modules -->
  <script src="https://unpkg.com/highcharts@11/highcharts.js"></script>
  <script src="https://unpkg.com/highcharts@11/highcharts-more.js"></script>
  <script src="https://unpkg.com/highcharts@11/modules/heatmap.js"></script>
  <script src="https://unpkg.com/highcharts@11/modules/drilldown.js"></script>

  <style>
    :root {
      --bg-dark: #f8f9fa;
      --bg-card: #ffffff;
      --border-color: #e0e7ff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --chart-bg: #ffffff;
      --chart-grid: #e2e8f0;
      --chart-label: #64748b;
    }

    :root[data-theme="dark"] {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --border-color: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --chart-bg: #1e293b;
      --chart-grid: #334155;
      --chart-label: #94a3b8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--bg-dark);
      color: var(--text-main);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    header {
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    header h1 {
      margin: 0 0 5px 0;
      font-size: 1.75rem;
    }

    header p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* KPI Summary Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .kpi-title {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .kpi-value {
      font-size: 1.5rem;
      font-weight: bold;
      font-family: monospace;
    }

    .text-warning { color: #facc15; }
    .text-success { color: #4ade80; }
    .text-danger { color: #f87171; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); border-color: rgba(248, 113, 113, 0.8); }
      70% { box-shadow: 0 0 0 10px rgba(248, 113, 113, 0); border-color: rgba(248, 113, 113, 0); }
      100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); border-color: rgba(248, 113, 113, 0); }
    }

    .pulse-alert {
      border-color: #f87171;
      animation: pulse 2s infinite;
    }

    /* Grid Layout for Analytics Cards */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 1024px) {
      .dashboard-grid, .kpi-row {
        grid-template-columns: 1fr;
      }
    }

    .chart-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }

    .chart-container {
      width: 100%;
      height: 380px;
    }

    /* Theme Toggle Button */
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-main);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .theme-toggle:hover {
      background-color: var(--border-color);
      transform: scale(1.05);
    }

    header {
      position: relative;
    }
    .highcharts-credits{
      display: none !important;
    }
  </style>
</head>
<body>

  <header>
    <h1>📊 Process Mining Operations Control</h1>
    <p>Operational execution insights, active pipeline latency analytics, and automated optimization matrices.</p>
    <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme(event)">
      <span id="themeIcon">🌙</span>
      <span id="themeLabel">Dark</span>
    </button>
  </header>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-title">Average Cycle Time</div>
      <div class="kpi-value text-warning">4.2 Days</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-title">SLA Conformance Rate</div>
      <div class="kpi-value text-success">91.4%</div>
    </div>
    <div class="kpi-card pulse-alert">
      <div class="kpi-title">Active Bottleneck Alert</div>
      <div class="kpi-value text-danger">18.4h Idle Delay on Verification Handoff</div>
    </div>
  </div>

  <div class="dashboard-grid">
    
    <!-- 1. Activity Duration vs SLA Thresholds -->
    <div class="chart-card">
      <div id="duration-sla-chart" class="chart-container"></div>
    </div>

    <!-- 2. Transition Bottleneck Heatmap -->
    <div class="chart-card">
      <div id="bottleneck-heatmap" class="chart-container"></div>
    </div>

    <!-- 3. Subprocess Aggregations & Child Drilldowns -->
    <div class="chart-card">
      <div id="child-aggregation-chart" class="chart-container"></div>
    </div>

    <!-- 4. Enhancement Options & Automation Matrix -->
    <div class="chart-card">
      <div id="enhancement-matrix" class="chart-container"></div>
    </div>

  </div>

  <script>
    // Theme Management
    function initializeTheme() {
      const savedTheme = localStorage.getItem('chartTheme') || 'light';
      applyTheme(savedTheme);
    }

    function toggleTheme(e)
     {
      e.preventDefault();
      const htmlElement = document.documentElement;
      const currentTheme = htmlElement.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      applyTheme(newTheme);
    }

    function applyTheme(theme) {
      const htmlElement = document.documentElement;
      const themeLabel = document.getElementById('themeLabel');
      const themeIcon = document.getElementById('themeIcon');
      
      if (theme === 'dark') {
        htmlElement.setAttribute('data-theme', 'dark');
        themeLabel.textContent = 'Light';
        themeIcon.textContent = '☀️';
      } else {
        htmlElement.removeAttribute('data-theme');
        themeLabel.textContent = 'Dark';
        themeIcon.textContent = '🌙';
      }
      
      localStorage.setItem('chartTheme', theme);
      updateChartsTheme(theme);
    }

    function updateChartsTheme(theme) {
      const themeOptions = theme === 'dark' ? darkThemeOptions : lightThemeOptions;
      Highcharts.setOptions(themeOptions);
      
      // Update existing charts without full page reload
      Highcharts.charts.forEach(chart => {
        if (chart) {
          chart.update({
            chart: themeOptions.chart,
            title: themeOptions.title,
            subtitle: themeOptions.subtitle,
            xAxis: themeOptions.xAxis,
            yAxis: themeOptions.yAxis,
            tooltip: themeOptions.tooltip,
            legend: themeOptions.legend
          });
        }
      });
    }

    // Apply Global Light Theme Options to Highcharts Configuration
    const lightThemeOptions = {
      chart: {
        backgroundColor: '#ffffff',
        style: { fontFamily: '-apple-system, sans-serif' }
      },
      title: { style: { color: '#1e293b', fontSize: '15px', fontWeight: 'bold' }, align: 'left' },
      subtitle: { style: { color: '#64748b', fontSize: '12px' }, align: 'left' },
      xAxis: {
        gridLineColor: '#e0e7ff',
        labels: { style: { color: '#64748b' } },
        lineColor: '#cbd5e1',
        minorGridLineColor: '#e0e7ff',
        tickColor: '#cbd5e1',
        title: { style: { color: '#64748b' } }
      },
      yAxis: {
        gridLineColor: '#e0e7ff',
        labels: { style: { color: '#64748b' } },
        lineColor: '#cbd5e1',
        minorGridLineColor: '#e0e7ff',
        tickColor: '#cbd5e1',
        title: { style: { color: '#64748b' } }
      },
      tooltip: {
        backgroundColor: 'rgba(255, 255, 255, 0.95)',
        borderWidth: 1,
        borderColor: '#e0e7ff',
        style: { color: '#1e293b', fontFamily: 'monospace' }
      },
      legend: {
        itemStyle: { color: '#1e293b' },
        itemHoverStyle: { color: '#0f172a' },
        itemHiddenStyle: { color: '#cbd5e1' }
      },
      credits: { enabled: false }
    };

    // Apply Global Dark Theme Options to Highcharts Configuration
    const darkThemeOptions = {
      chart: {
        backgroundColor: '#1e293b',
        style: { fontFamily: '-apple-system, sans-serif' }
      },
      title: { style: { color: '#f8fafc', fontSize: '15px', fontWeight: 'bold' }, align: 'left' },
      subtitle: { style: { color: '#94a3b8', fontSize: '12px' }, align: 'left' },
      xAxis: {
        gridLineColor: '#334155',
        labels: { style: { color: '#94a3b8' } },
        lineColor: '#334155',
        minorGridLineColor: '#334155',
        tickColor: '#334155',
        title: { style: { color: '#94a3b8' } }
      },
      yAxis: {
        gridLineColor: '#334155',
        labels: { style: { color: '#94a3b8' } },
        lineColor: '#334155',
        minorGridLineColor: '#334155',
        tickColor: '#334155',
        title: { style: { color: '#94a3b8' } }
      },
      tooltip: {
        backgroundColor: 'rgba(15, 23, 42, 0.95)',
        borderWidth: 1,
        borderColor: '#334155',
        style: { color: '#f8fafc', fontFamily: 'monospace' }
      },
      legend: {
        itemStyle: { color: '#f8fafc' },
        itemHoverStyle: { color: '#cbd5e1' },
        itemHiddenStyle: { color: '#475569' }
      },
      credits: { enabled: false }
    };
    
    // --- CHART 1: Activity Duration vs SLA Target (Current Level Log) ---
    Highcharts.chart('duration-sla-chart', {
      chart: { type: 'column' },
      title: { text: 'Current Level Activities: Performance vs SLA Target' },
      subtitle: { text: 'Identifies active execution cycles exceeding organizational parameters' },
      xAxis: { categories: ['Receive Invoice', 'Verify Details', 'Approve Payment', 'Archival Logging'] },
      yAxis: { title: { text: 'Duration Time (Hours)' }, min: 0 },
      tooltip: { shared: true, valueSuffix: ' hrs' },
      series: [{
        name: 'Actual Average Duration',
        data: [0.2, 4.8, 74.4, 28.8], // 3.1 days = 74.4 hours (SLA Breached)
        color: '#ef4444'
      }, {
        name: 'SLA Target Threshold',
        data: [1.0, 6.0, 48.0, 24.0],
        color: '#10b981',
        type: 'line',
        dashStyle: 'Dash'
      }]
    });

    // --- CHART 2: Transition Bottleneck Heatmap ---
    Highcharts.chart('bottleneck-heatmap', {
      chart: { type: 'heatmap' },
      title: { text: 'Transition Latency Map (Process Handoff Delay)' },
      subtitle: { text: 'Monitors friction points and queue times between consecutive activities' },
      xAxis: { categories: ['Start', 'Receive Invoice', 'Verify Details', 'Approve Payment'] },
      yAxis: { categories: ['Receive Invoice', 'Verify Details', 'Approve Payment', 'End Event'] },
      colorAxis: {
        min: 0,
        minColor: '#1e293b',
        maxColor: '#7f1d1d',
        labels: { format: '{value}h' }
      },
      tooltip: {
        formatter: function () {
          return '<b>From:</b> ' + this.series.xAxis.categories[this.point.x] + '<br>' +
            '<b>To:</b> ' + this.series.yAxis.categories[this.point.y] + '<br>' +
            '<b>Idle Wait Time:</b> ' + this.point.value + ' hours';
        }
      },
      series: [{
        name: 'Transition Delay Matrix',
        borderWidth: 1,
        borderColor: '#334155',
        data: [
          [0, 0, 0.1], // Start -> Receive Invoice
          [1, 1, 0.5], // Receive Invoice -> Verify Details
          [2, 2, 18.4], // Verify Details -> Approve Payment (CRITICAL BOTTLENECK)
          [3, 3, 1.2]  // Approve Payment -> End Event
        ],
        dataLabels: { enabled: true, color: '#f8fafc', style: { textOutline: 'none' }, format: '{point.value}h' }
      }]
    });

    // --- CHART 3: Aggregated Insights from Children (Drilldown Chart) ---
    Highcharts.chart('child-aggregation-chart', {
      chart: { type: 'bar' },
      title: { text: 'Aggregated Subprocess Rollups & Child Variations' },
      subtitle: { text: 'Click on parent blocks to drill down into localized performance layers' },
      xAxis: { type: 'category' },
      yAxis: { title: { text: 'Total Consolidated Cycle Time (Days)' } },
      legend: { enabled: false },
      plotOptions: { series: { borderWidth: 0, dataLabels: { enabled: true, format: '{point.y:.1f} Days' } } },
      series: [{
        name: 'Main Processes',
        colorByPoint: true,
        colors: ['#3b82f6', '#8b5cf6'],
        data: [{
          name: 'Core Invoicing Stream',
          y: 3.3,
          drilldown: null
        }, {
          name: 'Archival Logging Loop',
          y: 1.2,
          drilldown: 'archival-child-rollup'
        }]
      }],
      drilldown: {
        breadcrumbs: { buttonTheme: { fill: '#334155', style: { color: '#f8fafc' } } },
        series: [{
          id: 'archival-child-rollup',
          name: 'Child Nodes Performance Aggregation',
          colors: ['#a78bfa', '#c084fc', '#d8b4fe', '#e9d5ff'],
          colorByPoint: true,
          data: [
            ['Metadata Parsing', 0.2],
            ['Database Commit', 0.1],
            ['Variant Compliance Check', 0.7], // Leading failure point
            ['Cloud Sync Confirm', 0.2]
          ]
        }]
      }
    });

    // --- CHART 4: Options for Enhancement & Automation Matrix ---
    Highcharts.chart('enhancement-matrix', {
      chart: { type: 'bubble', plotBorderWidth: 1, plotBorderColor: '#334155' },
      title: { text: 'Enhancement Feasibility vs Performance Impact Matrix' },
      subtitle: { text: 'Bubble Size indicates projected cost reductions ($)' },
      xAxis: { title: { text: 'Implementation Complexity / Effort Rating' }, min: 0, max: 10 },
      yAxis: { title: { text: 'Frequency / Multi-occurrence Log Count' }, min: 0, max: 1000 },
      tooltip: {
        useHTML: true,
        headerFormat: '<table>',
        pointFormat: '<tr><th colspan="2"><h3>{point.name}</h3></th></tr>' +
          '<tr><th>Complexity Score:</th><td>{point.x}/10</td></tr>' +
          '<tr><th>Monthly Volume:</th><td>{point.y} entries</td></tr>' +
          '<tr><th>Savings Potential:</th><td>${point.z} USD</td></tr>',
        footerFormat: '</table>',
        followPointer: true
      },
      plotOptions: {
        bubble: {
          dataLabels: {
            enabled: true,
            format: '{point.name}',
            style: { color: '#black', textOutline: 'none', fontSize: '10px' }
          }
        }
      },
      series: [{
        name: 'Automation Targets',
        color: '#f59e0b',
        data: [
          { x: 2, y: 850, z: 12000, name: '💡 Auto-Approve Under $500' }, // High Volume, Low Complexity, Good Savings = Quick Win
          { x: 5, y: 400, z: 4500, name: 'OCR Ingestion Script' },
          { x: 8, y: 950, z: 25000, name: 'ERP Native API Redesign' },
          { x: 4, y: 150, z: 1500, name: 'Stale Queue Auto-Escalation' }
        ]
      }]
    });
    
    // Set the initial theme on page load
    const initialTheme = localStorage.getItem('chartTheme') || 'light';
    Highcharts.setOptions(initialTheme === 'dark' ? darkThemeOptions : lightThemeOptions);
  </script>
</body>
</html>
