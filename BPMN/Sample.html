<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOR Multi-Level Drill-Through Viewer</title>

  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@12.0.0/dist/assets/diagram-js.css" />
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@12.0.0/dist/assets/bpmn-font/css/bpmn.css" />

  <style>
    html, body, #canvas {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background-color: #fafafa;
    }
    #navigation-info {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 20px;
      border-radius: 6px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      border-left: 5px solid #007acc;
      z-index: 1000;
      pointer-events: none;
    }
    h2 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
    p { margin: 0; font-size: 13px; color: #666; }
    /* Breadcrumb Component Styling */
    #breadcrumb-container {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(255, 255, 255, 0.96);
      padding: 10px 18px;
      border-radius: 6px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      border-left: 4px solid #007acc;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }
    .breadcrumb-link {
      color: #007acc;
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }
    .breadcrumb-link:hover {
      text-decoration: underline;
    }
    .breadcrumb-separator {
      color: #999;
      user-select: none;
    }
    .breadcrumb-current {
      color: #333;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div id="breadcrumb-container"></div>

  <div id="canvas"></div>

    const viewer = new BpmnJS({ container: '#canvas' });

      //   return null;
      // }
      
      function findDiagramForProcess(sourceElementId) {
  const definitions = viewer.getDefinitions();
  
  // 1. Scan all root elements to locate the process containing our clicked node
  for (const rootElement of definitions.rootElements) {
    if (rootElement.$type === 'bpmn:Process' && rootElement.flowElements) {
      
      // Look for the specific clicked element ID inside this process scope
      const element = rootElement.flowElements.find(el => el.id === sourceElementId);
      
      // 2. If found and it is a Call Activity, extract its target process ID
      if (element && element.$type === 'bpmn:CallActivity') {
        const targetProcessId = element.calledElement;
        
        // 3. Find and return the diagram plane matched directly to that process container ID
        return definitions.diagrams.find(diagram => 
          diagram.plane.bpmnElement.id === targetProcessId
        );
      }
    }
  }
  return null;
}
// 7. Breadcrumb UI Component Orchestration Logic
      function initBreadcrumbs(initialDiagram) {
        navigationStack = [ initialDiagram ];
        renderBreadcrumbs();
        canvas.zoom('fit-viewport');
      }

      function renderBreadcrumbs() {
        const container = document.getElementById('breadcrumb-container');
        container.innerHTML = ''; // Clear previous tree nodes

        navigationStack.forEach((diagram, index) => {
          // Append arrow separator token if not the root layout node
          if (index > 0) {
            const separator = document.createElement('span');
            separator.className = 'breadcrumb-separator';
            separator.innerText = '➔';
            container.appendChild(separator);
          }

          const isCurrentPlane = (index === navigationStack.length - 1);
          const breadcrumbNode = document.createElement('span');
          
          // Use diagram metadata name if declared, fallback to diagram ID anchor
          breadcrumbNode.innerText = diagram.name || diagram.id;

          if (isCurrentPlane) {
            breadcrumbNode.className = 'breadcrumb-current';
          } else {
            breadcrumbNode.className = 'breadcrumb-link';
            
            // Wire interaction hook to shift focus back up the architecture tree
            breadcrumbNode.addEventListener('click', () => {
              // Slice array elements forward to clean history path accurately
              navigationStack = navigationStack.slice(0, index + 1);
              
              viewer.open(diagram);
              renderBreadcrumbs();
              
              setTimeout(() => viewer.get('canvas').zoom('fit-viewport'), 10);
            });
          }
          container.appendChild(breadcrumbNode);
        });
      }

    }).catch(err => console.error('BPMN 2.0 XML Engine Parsing Error:', err));
  </script>
