<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Alma's Catch Game 🌟</title>
<meta name="description" content="A fun, colorful catching game for kids! Move the smiley face to catch the stars.">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    cursor: none;
    font-family: 'Segoe UI', 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
  }

  #game-wrapper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a1a;
  }

  #game-canvas {
    display: block;
  }

  /* TV-safe margins: inset UI by ~5% from edges for overscan */
  #ui-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 5vh 5vw;
  }

  #score-display {
    font-size: clamp(48px, 6vw, 120px);
    font-weight: 900;
    color: #ffd93d;
    text-shadow:
      0 0 30px rgba(255, 217, 61, 0.8),
      0 0 60px rgba(255, 217, 61, 0.4),
      3px 3px 0 #1a0a2e;
    letter-spacing: 3px;
    transition: transform 0.15s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  }

  #instruction-text {
    margin-top: 10px;
    font-size: clamp(24px, 3vw, 48px);
    color: #ffffff;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.25);
    font-weight: 700;
  }

  #score-display.pulse {
    transform: scale(1.35);
  }

  #gamepad-status {
    padding: 16px 36px;
    border-radius: 50px;
    font-size: clamp(16px, 2.5vw, 36px);
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: all 0.4s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  #gamepad-status.disconnected {
    background: linear-gradient(135deg, #2a1a1a, #3d1a1a);
    color: #ff6b6b;
    border: 3px solid #ff6b6b;
    box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
  }

  #gamepad-status.connected {
    background: linear-gradient(135deg, #1a2a1a, #1a3d1a);
    color: #6bff6b;
    border: 3px solid #6bff6b;
    box-shadow: 0 0 20px rgba(107, 255, 107, 0.4);
  }

  /* Fullscreen toggle button */
  #fullscreen-btn {
    position: fixed;
    bottom: 5vh;
    right: 5vw;
    z-index: 20;
    width: clamp(48px, 6vw, 90px);
    height: clamp(48px, 6vw, 90px);
    border-radius: 50%;
    border: 3px solid rgba(255, 255, 255, 0.3);
    background: rgba(20, 20, 40, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    font-size: clamp(22px, 3vw, 44px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer !important;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    line-height: 1;
  }

  #fullscreen-btn:hover {
    background: rgba(40, 40, 80, 0.9);
    border-color: rgba(255, 217, 61, 0.6);
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255, 217, 61, 0.3);
  }

  #fullscreen-btn:active {
    transform: scale(0.95);
  }

  /* Hide cursor completely for TV */
  * { cursor: none !important; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game-canvas"></canvas>
</div>
<div id="ui-overlay">
  <div id="score-display">⭐ 0</div>
  <div id="instruction-text">Catch the letter C!</div>
  <div id="gamepad-status" class="disconnected">🎮 Press any button to connect!</div>
</div>
<button id="fullscreen-btn" title="Enter Fullscreen">⤢</button>

<script>
(function() {
  'use strict';

  // ─── Canvas Setup ───
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score-display');
  const instructionEl = document.getElementById('instruction-text');
  const gamepadStatusEl = document.getElementById('gamepad-status');

  let W, H;

  // ─── Scale factor for TV: all game entities scale relative to screen size ───
  function getScale() {
    // Base design is 1920x1080. Scale entities proportionally.
    return Math.min(W, H) / 1080;
  }

  function resize() {
    // Fullscreen canvas — fill the entire screen for TV
    W = window.innerWidth;
    H = window.innerHeight;

    // Use devicePixelRatio for crisp rendering on high-DPI displays
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Update entity sizes based on new scale
    const s = getScale();
    player.r = 70 * s;
    player.speed = 8 * s;
    target.r = 50 * s;

    // Keep player & target in bounds after resize
    if (player) {
      player.x = Math.max(player.r, Math.min(W - player.r, player.x));
      player.y = Math.max(player.r, Math.min(H - player.r, player.y));
    }
    if (target) {
      target.x = Math.max(target.r + 10, Math.min(W - target.r - 10, target.x));
      target.y = Math.max(target.r + 10, Math.min(H - target.r - 10, target.y));
    }
  }

  window.addEventListener('resize', resize);

  // ─── Fullscreen helpers for TV ───
  let hasGoneFullscreen = false;

  function goFullscreen() {
    if (hasGoneFullscreen) return;
    hasGoneFullscreen = true;
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (rfs) {
      rfs.call(el).catch(function() { /* silently fail if blocked */ });
    }
  }

  function toggleFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      var exitFs = document.exitFullscreen || document.webkitExitFullscreen;
      if (exitFs) exitFs.call(document).catch(function() {});
    } else {
      var el = document.documentElement;
      var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if (rfs) rfs.call(el).catch(function() {});
    }
  }

  function updateFullscreenBtn() {
    var btn = document.getElementById('fullscreen-btn');
    if (btn) {
      var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      btn.textContent = isFs ? '⤡' : '⤢';
      btn.title = isFs ? 'Exit Fullscreen' : 'Enter Fullscreen';
    }
  }

  document.addEventListener('fullscreenchange', updateFullscreenBtn);
  document.addEventListener('webkitfullscreenchange', updateFullscreenBtn);

  document.getElementById('fullscreen-btn').addEventListener('click', function() {
    toggleFullscreen();
    ensureAudio();
  });

  // ─── Web Audio API Setup ───
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playDing() {
    ensureAudio();
    if (!audioCtx) return;

    const now = audioCtx.currentTime;

    // Happy ascending ding
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    const gain2 = audioCtx.createGain();

    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(523.25, now);      // C5
    osc1.frequency.setValueAtTime(659.25, now + 0.08); // E5
    osc1.frequency.setValueAtTime(783.99, now + 0.16); // G5
    gain1.gain.setValueAtTime(0.4, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc1.connect(gain1).connect(audioCtx.destination);
    osc1.start(now);
    osc1.stop(now + 0.5);

    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(1046.5, now + 0.1); // C6
    gain2.gain.setValueAtTime(0.2, now + 0.1);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(now + 0.1);
    osc2.stop(now + 0.6);
  }

  function playButtonSound() {
    ensureAudio();
    if (!audioCtx) return;

    var now = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();

    osc.type = 'sine';
    var notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
    osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)], now);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.15);
  }

  // ─── Game State ───
  let score = 0;
  let gamepadConnected = false;
  let lastGamepadId = null;
  let faceMood = 'happy';
  let letters = [];
  let targetLetter = 'C';

  const DISTRACTOR_LETTERS = ['A', 'B', 'D', 'E', 'G', 'O', 'P', 'R', 'S', 'U'];
  const ALL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  function setTargetLetter(letter) {
    targetLetter = letter;
    if (instructionEl) {
      instructionEl.textContent = `Catch the letter ${letter}!`;
    }
  }

  function pickNewTargetLetter() {
    let next = targetLetter;
    while (next === targetLetter) {
      next = ALL_LETTERS[Math.floor(Math.random() * ALL_LETTERS.length)];
    }
    return next;
  }

  // ─── Dynamic Colors (button-triggered for toddler feedback) ───
  let faceColorIndex = 0;
  let starColorIndex = 0;
  const prevButtons = [];

  const FACE_COLORS = [
    { light: '#fff176', mid: '#ffd93d', dark: '#f0a500', outline: '#d4890a', glow: '#ffd93d', smile: '#8B5E00' },
    { light: '#ff99cc', mid: '#ff6b9d', dark: '#d4478a', outline: '#a0356a', glow: '#ff6b9d', smile: '#8B2050' },
    { light: '#99ddff', mid: '#6bb5ff', dark: '#4780d4', outline: '#3560a0', glow: '#6bb5ff', smile: '#1a3a6b' },
    { light: '#99ffbb', mid: '#6bff8b', dark: '#47d460', outline: '#35a048', glow: '#6bff8b', smile: '#1a5b2a' },
    { light: '#cc99ff', mid: '#a06bff', dark: '#7847d4', outline: '#5a35a0', glow: '#a06bff', smile: '#3a1a6b' },
    { light: '#ffcc99', mid: '#ff9d6b', dark: '#d47847', outline: '#a05a35', glow: '#ff9d6b', smile: '#6b3a1a' },
    { light: '#99ffff', mid: '#6bffee', dark: '#47d4c4', outline: '#35a098', glow: '#6bffee', smile: '#1a5b55' },
    { light: '#ff9999', mid: '#ff6b6b', dark: '#d44747', outline: '#a03535', glow: '#ff6b6b', smile: '#6b1a1a' },
  ];

  const STAR_COLORS = [
    { light: '#ff9999', mid: '#ff4757', dark: '#c0392b', outline: '#ff8888', glow: '#ff6b6b' },
    { light: '#99ddff', mid: '#4799ff', dark: '#2b60c0', outline: '#88bbff', glow: '#6b9dff' },
    { light: '#ffff99', mid: '#ffee47', dark: '#c0b02b', outline: '#ffee88', glow: '#ffe06b' },
    { light: '#ff99ff', mid: '#ff47ee', dark: '#c02bb0', outline: '#ff88ee', glow: '#ff6bdd' },
    { light: '#99ffbb', mid: '#47ff77', dark: '#2bc050', outline: '#88ff99', glow: '#6bff7b' },
    { light: '#ffcc99', mid: '#ff9947', dark: '#c0702b', outline: '#ffbb88', glow: '#ff8b6b' },
    { light: '#cc99ff', mid: '#9947ff', dark: '#6b2bc0', outline: '#bb88ff', glow: '#a06bff' },
  ];

  // ─── Player (sizes set by resize()) ───
  const player = {
    x: 0, y: 0,
    r: 70,
    speed: 8,
    vx: 0, vy: 0,
    bobPhase: 0
  };

  // ─── Target (sizes set by resize()) ───
  const target = {
    x: 0, y: 0,
    r: 50,
    rotation: 0,
    pulsePhase: 0,
    spawnAnim: 1
  };

  function spawnTarget() {
    const margin = target.r + 60;
    target.x = margin + Math.random() * (W - margin * 2);
    target.y = margin + Math.random() * (H - margin * 2);
    target.spawnAnim = 0;

    // Ensure it doesn't spawn right on top of the player
    const dx = target.x - player.x;
    const dy = target.y - player.y;
    if (Math.sqrt(dx * dx + dy * dy) < player.r + target.r + 100) {
      spawnTarget();
    }
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  function spawnLetters() {
    letters.length = 0;
    const choices = [targetLetter];
    const distractors = DISTRACTOR_LETTERS.slice();
    shuffle(distractors);
    for (let i = 0; i < 3; i++) choices.push(distractors[i]);
    shuffle(choices);

    const margin = target.r + 60;
    const positions = [];

    for (let i = 0; i < 4; i++) {
      let x, y;
      let safe = false;
      while (!safe) {
        x = margin + Math.random() * (W - margin * 2);
        y = margin + Math.random() * (H - margin * 2);
        safe = true;
        if (Math.hypot(x - player.x, y - player.y) < player.r + target.r + 120) safe = false;
        for (const pos of positions) {
          if (Math.hypot(x - pos.x, y - pos.y) < target.r * 3) {
            safe = false;
            break;
          }
        }
      }
      positions.push({ x, y });
      letters.push({
        x,
        y,
        r: target.r,
        rotation: Math.random() * Math.PI * 2,
        pulsePhase: Math.random() * Math.PI * 2,
        spawnAnim: 0,
        letter: choices[i],
        colorIndex: Math.floor(Math.random() * STAR_COLORS.length)
      });
    }
  }

  // ─── Particles ───
  const particles = [];

  const PARTICLE_COLORS = [
    '#ff6ec7', '#ffd93d', '#6bff6b', '#4dc9f6',
    '#f67280', '#c06cf6', '#ff9f43', '#00d2d3',
    '#ff6b6b', '#48dbfb', '#feca57', '#ff9ff3'
  ];

  function burstParticles(x, y, count) {
    const s = getScale();
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
      const speed = (3 + Math.random() * 6) * s;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: (8 + Math.random() * 16) * s,
        color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
        life: 1.0,
        decay: 0.010 + Math.random() * 0.012
      });
    }
  }

  // ─── Background Stars ───
  const bgStars = [];
  function initBgStars() {
    bgStars.length = 0;
    for (let i = 0; i < 80; i++) {
      bgStars.push({
        x: Math.random(),
        y: Math.random(),
        r: 0.5 + Math.random() * 2.5,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.01 + Math.random() * 0.03
      });
    }
  }

  // ─── Neon Border Colors (for drawing inside canvas) ───
  const borderColors = ['#ff6ec7', '#ffd93d', '#6bff6b', '#4dc9f6', '#f67280', '#c06cf6'];

  // ─── Input ───
  const keys = {};
  window.addEventListener('keydown', function(e) {
    keys[e.code] = true;
    ensureAudio();
    e.preventDefault();
  });
  window.addEventListener('keyup', function(e) {
    keys[e.code] = false;
    e.preventDefault();
  });

  // Prevent context menu
  window.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // Ensure audio + fullscreen on first interaction
  window.addEventListener('pointerdown', function() {
    ensureAudio();
    goFullscreen();
  }, { once: true });

  // ─── Gamepad ───
  window.addEventListener('gamepadconnected', function(e) {
    gamepadConnected = true;
    lastGamepadId = e.gamepad.index;
    gamepadStatusEl.textContent = '🎮 Connected!';
    gamepadStatusEl.className = 'connected';
    ensureAudio();
    goFullscreen();
  });

  window.addEventListener('gamepaddisconnected', function(e) {
    if (e.gamepad.index === lastGamepadId) {
      gamepadConnected = false;
      lastGamepadId = null;
      gamepadStatusEl.textContent = '🎮 Press any button to connect!';
      gamepadStatusEl.className = 'disconnected';
    }
  });

  const DEADZONE = 0.15;

  function readGamepad() {
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    let gp = null;

    for (let i = 0; i < gamepads.length; i++) {
      if (gamepads[i]) {
        gp = gamepads[i];

        if (!gamepadConnected) {
          // Check if any button is pressed
          let anyPressed = false;
          for (let b = 0; b < gp.buttons.length; b++) {
            if (gp.buttons[b].pressed) { anyPressed = true; break; }
          }
          for (let a = 0; a < gp.axes.length; a++) {
            if (Math.abs(gp.axes[a]) > DEADZONE) { anyPressed = true; break; }
          }
          if (anyPressed) {
            gamepadConnected = true;
            lastGamepadId = gp.index;
            gamepadStatusEl.textContent = '🎮 Connected!';
            gamepadStatusEl.className = 'connected';
            ensureAudio();
            goFullscreen();
          }
        }
        break;
      }
    }

    if (!gp) return { x: 0, y: 0 };

    // Detect button presses for color changes (toddler feedback)
    for (let b = 0; b < gp.buttons.length; b++) {
      const isPressed = gp.buttons[b].pressed;
      const wasPressed = prevButtons[b] || false;

      if (isPressed && !wasPressed) {
        // New button press: cycle colors + burst particles + play note
        faceColorIndex = (faceColorIndex + 1) % FACE_COLORS.length;
        starColorIndex = (starColorIndex + 1) % STAR_COLORS.length;
        burstParticles(player.x, player.y, 10);
        playButtonSound();
      }
      prevButtons[b] = isPressed;
    }

    let x = 0, y = 0;

    // Left analog stick (Axes 0, 1)
    if (gp.axes.length >= 2) {
      const ax = gp.axes[0];
      const ay = gp.axes[1];
      if (Math.abs(ax) > DEADZONE) x = ax;
      if (Math.abs(ay) > DEADZONE) y = ay;
    }

    // D-Pad fallback (buttons 12=Up, 13=Down, 14=Left, 15=Right)
    if (x === 0 && y === 0 && gp.buttons.length >= 16) {
      if (gp.buttons[12].pressed) y = -1; // Up
      if (gp.buttons[13].pressed) y = 1;  // Down
      if (gp.buttons[14].pressed) x = -1; // Left
      if (gp.buttons[15].pressed) x = 1;  // Right
    }

    return { x, y };
  }

  // ─── Drawing Helpers ───

  let borderPhase = 0;

  function drawBackground() {
    // Gradient background
    const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
    grad.addColorStop(0, '#1a1a3e');
    grad.addColorStop(0.5, '#12122a');
    grad.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Twinkling stars
    for (const star of bgStars) {
      star.twinklePhase += star.twinkleSpeed;
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(star.twinklePhase));
      ctx.beginPath();
      ctx.arc(star.x * W, star.y * H, star.r * getScale(), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fill();
    }

    // Animated neon border inside the canvas
    borderPhase += 0.008;
    const bw = 5 * getScale(); // border thickness scales with screen
    const segments = 120;

    for (let i = 0; i < segments; i++) {
      const t = i / segments;
      const colorIdx = Math.floor((t + borderPhase) * borderColors.length) % borderColors.length;
      const nextColorIdx = (colorIdx + 1) % borderColors.length;
      const blend = ((t + borderPhase) * borderColors.length) % 1;

      ctx.strokeStyle = borderColors[colorIdx];
      ctx.lineWidth = bw;
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin((t + borderPhase) * Math.PI * 4);

      // Perimeter: top → right → bottom → left
      const perimeter = 2 * (W + H);
      const start = t * perimeter;
      const end = (t + 1 / segments) * perimeter;

      ctx.beginPath();
      const pts = perimeterPoints(start, end);
      if (pts.length >= 2) {
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let j = 1; j < pts.length; j++) {
          ctx.lineTo(pts[j].x, pts[j].y);
        }
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Soft glow on the border edges
    const glowSize = 15 * getScale();

    // Top glow
    const tGlow = ctx.createLinearGradient(0, 0, 0, glowSize);
    tGlow.addColorStop(0, 'rgba(255, 110, 199, 0.15)');
    tGlow.addColorStop(1, 'rgba(255, 110, 199, 0)');
    ctx.fillStyle = tGlow;
    ctx.fillRect(0, 0, W, glowSize);

    // Bottom glow
    const bGlow = ctx.createLinearGradient(0, H, 0, H - glowSize);
    bGlow.addColorStop(0, 'rgba(77, 201, 246, 0.15)');
    bGlow.addColorStop(1, 'rgba(77, 201, 246, 0)');
    ctx.fillStyle = bGlow;
    ctx.fillRect(0, H - glowSize, W, glowSize);

    // Left glow
    const lGlow = ctx.createLinearGradient(0, 0, glowSize, 0);
    lGlow.addColorStop(0, 'rgba(107, 255, 107, 0.12)');
    lGlow.addColorStop(1, 'rgba(107, 255, 107, 0)');
    ctx.fillStyle = lGlow;
    ctx.fillRect(0, 0, glowSize, H);

    // Right glow
    const rGlow = ctx.createLinearGradient(W, 0, W - glowSize, 0);
    rGlow.addColorStop(0, 'rgba(192, 108, 246, 0.12)');
    rGlow.addColorStop(1, 'rgba(192, 108, 246, 0)');
    ctx.fillStyle = rGlow;
    ctx.fillRect(W - glowSize, 0, glowSize, H);
  }

  function perimeterPoints(start, end) {
    // Maps a linear position along the rectangle perimeter to x,y
    const pts = [];
    const positions = [start, end];
    for (const pos of positions) {
      let p = pos;
      if (p < W) {
        // Top edge
        pts.push({ x: p, y: 0 });
      } else if (p < W + H) {
        // Right edge
        pts.push({ x: W, y: p - W });
      } else if (p < 2 * W + H) {
        // Bottom edge
        pts.push({ x: W - (p - W - H), y: H });
      } else {
        // Left edge
        pts.push({ x: 0, y: H - (p - 2 * W - H) });
      }
    }
    return pts;
  }

  function drawPlayer(p) {
    const bobY = Math.sin(p.bobPhase) * 4 * getScale();
    const px = p.x;
    const py = p.y + bobY;
    const r = p.r;

    // Glow
    const fc = FACE_COLORS[faceColorIndex];
    ctx.save();
    ctx.shadowColor = fc.glow;
    ctx.shadowBlur = 35 * getScale();

    // Body
    const bodyGrad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, r * 0.1, px, py, r);
    bodyGrad.addColorStop(0, fc.light);
    bodyGrad.addColorStop(0.5, fc.mid);
    bodyGrad.addColorStop(1, fc.dark);
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    ctx.shadowBlur = 0;

    // Outline
    ctx.lineWidth = 4 * getScale();
    ctx.strokeStyle = fc.outline;
    ctx.stroke();

    // Eyes
    const eyeOffX = r * 0.28;
    const eyeOffY = -r * 0.15;
    const eyeR = r * 0.14;

    // Left eye white
    ctx.beginPath();
    ctx.arc(px - eyeOffX, py + eyeOffY, eyeR + 3 * getScale(), 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    // Left pupil
    ctx.beginPath();
    ctx.arc(px - eyeOffX + 1 * getScale(), py + eyeOffY + 1 * getScale(), eyeR * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#2d1b00';
    ctx.fill();
    // Left pupil shine
    ctx.beginPath();
    ctx.arc(px - eyeOffX - 1 * getScale(), py + eyeOffY - 2 * getScale(), eyeR * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // Right eye white
    ctx.beginPath();
    ctx.arc(px + eyeOffX, py + eyeOffY, eyeR + 3 * getScale(), 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    // Right pupil
    ctx.beginPath();
    ctx.arc(px + eyeOffX + 1 * getScale(), py + eyeOffY + 1 * getScale(), eyeR * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#2d1b00';
    ctx.fill();
    // Right pupil shine
    ctx.beginPath();
    ctx.arc(px + eyeOffX - 1 * getScale(), py + eyeOffY - 2 * getScale(), eyeR * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // Blush cheeks
    ctx.beginPath();
    ctx.arc(px - r * 0.52, py + r * 0.18, r * 0.16, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 130, 100, 0.35)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px + r * 0.52, py + r * 0.18, r * 0.16, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 130, 100, 0.35)';
    ctx.fill();

    // Smile / frown
    ctx.beginPath();
    if (faceMood === 'happy') {
      ctx.arc(px, py + r * 0.05, r * 0.45, 0.15 * Math.PI, 0.85 * Math.PI);
    } else {
      ctx.arc(px, py + r * 0.18, r * 0.35, 1.1 * Math.PI, 1.9 * Math.PI, true);
    }
    ctx.lineWidth = 4 * getScale();
    ctx.lineCap = 'round';
    ctx.strokeStyle = fc.smile;
    ctx.stroke();

    ctx.restore();
  }

  function drawStar(cx, cy, spikes, outerR, innerR, rotation) {
    let rot = rotation - Math.PI / 2;
    const step = Math.PI / spikes;

    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
      const r = i % 2 === 0 ? outerR : innerR;
      const angle = rot + i * step;
      const sx = cx + Math.cos(angle) * r;
      const sy = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
  }

  function drawTarget(t) {
    const scale = Math.min(1, t.spawnAnim * 1.2);
    const pulse = 1 + Math.sin(t.pulsePhase) * 0.08;
    const r = t.r * scale * pulse;

    const sc = STAR_COLORS[t.colorIndex];
    ctx.save();

    // Glow
    ctx.shadowColor = sc.glow;
    ctx.shadowBlur = (25 + Math.sin(t.pulsePhase * 1.5) * 10) * getScale();

    // Star shape
    drawStar(t.x, t.y, 5, r, r * 0.45, t.rotation);
    const starGrad = ctx.createRadialGradient(t.x - r * 0.2, t.y - r * 0.2, r * 0.1, t.x, t.y, r);
    starGrad.addColorStop(0, sc.light);
    starGrad.addColorStop(0.4, sc.mid);
    starGrad.addColorStop(1, sc.dark);
    ctx.fillStyle = starGrad;
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.lineWidth = 3 * getScale();
    ctx.strokeStyle = sc.outline;
    ctx.stroke();

    // Inner sparkle
    ctx.beginPath();
    ctx.arc(t.x, t.y, r * 0.22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.fill();

    // Letter label
    ctx.font = `bold ${Math.round(r * 0.7)}px Comic Sans MS, Arial, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.letter, t.x, t.y + r * 0.05);

    ctx.restore();
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.vy += 0.06; // Gentle gravity
      p.life -= p.decay;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life * 0.85;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // ─── Collision Detection ───
  function checkCollision() {
    for (let i = 0; i < letters.length; i++) {
      const t = letters[i];
      const dx = player.x - t.x;
      const dy = player.y - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < player.r + t.r * 0.7) {
        return t;
      }
    }
    return null;
  }

  // ─── Main Loop ───
  function update() {
    // Keyboard input
    let kx = 0, ky = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) kx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) kx += 1;
    if (keys['ArrowUp'] || keys['KeyW']) ky -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) ky += 1;

    // Gamepad input
    const gp = readGamepad();

    // Combine inputs (prefer whichever is active)
    let mx = kx || gp.x;
    let my = ky || gp.y;

    // Normalize diagonal movement
    const mag = Math.sqrt(mx * mx + my * my);
    if (mag > 1) {
      mx /= mag;
      my /= mag;
    }

    // Move player
    player.x += mx * player.speed;
    player.y += my * player.speed;

    // Boundary clamping
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y));

    // Player bob
    player.bobPhase += 0.04;

    // Target animation
    target.rotation += 0.02;
    target.pulsePhase += 0.06;
    target.spawnAnim = Math.min(1, target.spawnAnim + 0.04);

    // Letters animation
    letters.forEach(function(letter) {
      letter.rotation += 0.02;
      letter.pulsePhase += 0.06;
      letter.spawnAnim = Math.min(1, letter.spawnAnim + 0.04);
    });

    // Collision
    const hit = checkCollision();
    if (hit) {
      if (hit.letter === targetLetter) {
        score++;
        faceMood = 'happy';
        scoreEl.textContent = '⭐ ' + score;

        // Pulse score
        scoreEl.classList.add('pulse');
        setTimeout(function() { scoreEl.classList.remove('pulse'); }, 200);

        // Particles
        burstParticles(hit.x, hit.y, 30);

        // Sound
        playDing();

        // Change the target letter for the next round
        setTargetLetter(pickNewTargetLetter());
        spawnLetters();
      } else {
        faceMood = 'sad';
        burstParticles(hit.x, hit.y, 16);
        letters.splice(letters.indexOf(hit), 1);
        if (letters.length === 0) {
          spawnLetters();
        }
      }
    }
  }

  function draw() {
    drawBackground();
    drawParticles();
    letters.forEach(drawTarget);
    drawPlayer(player);
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // ─── Initialize ───
  resize();
  initBgStars();

  player.x = W / 2;
  player.y = H / 2;
  spawnLetters();

  loop();
})();
</script>
</body>
